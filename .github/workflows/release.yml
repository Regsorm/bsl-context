name: release

# Сборка бинарников под Windows / Linux / macOS и публикация их в GitHub Release.
# Триггеры:
#   - push тега vX.Y.Z — автоматическая сборка для будущих релизов;
#   - ручной запуск (workflow_dispatch) с указанием тега — чтобы добрать
#     артефакты к уже существующему релизу.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для сборки (например v0.4.0)'
        required: true

permissions:
  contents: write   # нужно для загрузки ассетов в Release

jobs:
  # Релиз создаётся ОДИН раз и до сборок. Раньше его создавала каждая из четырёх
  # параллельных работ — если готового ещё не видно. На v0.8.0 все четыре стартовали
  # в одну секунду, две успели создать по объекту релиза, и macOS (самая долгая сборка)
  # залила архив в свой дубль-черновик, а на публикации получила отказ
  # `already_exists: tag_name`. Итог: работа упала, архив под macOS в релиз не попал.
  create-release:
    name: Создать Release
    runs-on: ubuntu-latest
    steps:
      - name: Определить тег
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Идемпотентно: при повторном запуске (workflow_dispatch на существующий тег)
      # ничего не пересоздаётся, заметки релиза не затираются.
      - name: Создать релиз, если его ещё нет
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Релиз $TAG уже существует — создавать не нужно."
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi

  build:
    name: ${{ matrix.target }}
    needs: create-release   # релиз уже существует — сборкам остаётся только долить архивы
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # одна упавшая цель не отменяет остальные
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ''
            archive: tar.gz
          - os: macos-14          # Apple Silicon (покрывает Mac 2020+)
            target: aarch64-apple-darwin
            ext: ''
            archive: tar.gz

    steps:
      - name: Определить тег
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Для push тега checkout по умолчанию берёт сам тег; для ручного
      # запуска (workflow_dispatch) — ветку по умолчанию (main). И там, и там
      # присутствуют README/LICENSE/CHANGELOG, нужные шагу упаковки.
      - uses: actions/checkout@v4

      - name: Установить Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: musl-tools (только для musl-цели)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Сборка
        run: cargo build --release --locked --target ${{ matrix.target }} --bin bsl-context-rs

      - name: Упаковка (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="bsl-context-rs${{ matrix.ext }}"
          DIST="bsl-context-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          mkdir "$DIST"
          cp "target/${{ matrix.target }}/release/$BIN" "$DIST/"
          cp README.md README_RU.md LICENSE CHANGELOG.md configs/config.toml.example "$DIST/"
          tar czf "$DIST.tar.gz" "$DIST"
          echo "ASSET=$DIST.tar.gz" >> "$GITHUB_ENV"

      - name: Упаковка (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "bsl-context-rs${{ matrix.ext }}"
          $dist = "bsl-context-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/$bin" $dist
          Copy-Item README.md,README_RU.md,LICENSE,CHANGELOG.md,configs/config.toml.example $dist
          Compress-Archive -Path $dist -DestinationPath "$dist.zip"
          "ASSET=$dist.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Только заливка: релиз создан отдельной работой выше. Никакая сборка больше не
      # создаёт релиз сама, поэтому гонки за тег не возникает. --clobber делает шаг
      # повторяемым: перезапуск работы просто заменит архив, а не упадёт на дубле.
      - name: Загрузить в Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
